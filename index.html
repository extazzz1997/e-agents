  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ink-section-soft: #e9ebef;\n\n  --ink: #14161b;\n  --ink-2: #404550;\n  --ink-3: #5d6370;\n  --line: #e6e8ec;\n  --line-strong: #ccd0d7;\n\n  --accent: #2563eb;\n  --accent-press: #1e50c9;\n  --accent-soft: #dde8fd;\n  --accent-tint: #edf3fe;\n  --accent-rgb: 37,99,235;\n  --accent-light: #8fb1f3;\n  --good: #1c8f5a;\n  --good-soft: #e3f3ea;\n\n  --r-sm: 10px;\n  --r-md: 16px;\n  --r-lg: 24px;\n  --r-xl: 34px;\n  --shadow-sm: 0 1px 2px rgba(15,23,42,.05), 0 2px 8px rgba(15,23,42,.04);\n  --shadow-md: 0 4px 14px rgba(15,23,42,.07), 0 18px 50px rgba(15,23,42,.06);\n  --shadow-lg: 0 10px 30px rgba(15,23,42,.10), 0 40px 90px rgba(15,23,42,.10);\n\n  --maxw: 1180px;\n}\n\n*{box-sizing:border-box;margin:0;padding:0}\nhtml{scroll-behavior:smooth}\nbody{\n  font-family:var(--font);\n  background:var(--bg);\n  color:var(--ink);\n  line-height:1.5;\n  -webkit-font-smoothing:antialiased;\n  text-rendering:optimizeLegibility;\n  overflow-x:hidden;\n}\na{color:inherit;text-decoration:none}\nimg{max-width:100%;display:block}\n::selection{background:var(--accent);color:#fff}\n\n.wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px}\nsection{position:relative}\n\n/* ---------- shared type ---------- */\n.eyebrow{\n  font-family:var(--mono);\n  font-size:12.5px;\n  font-weight:600;\n  letter-spacing:.14em;\n  text-transform:uppercase;\n  color:var(--accent);\n  display:inline-flex;\n  align-items:center;\n  gap:9px;\n}\n.eyebrow::before{\n  content:\"\";\n  width:22px;height:1.5px;background:var(--accent);display:inline-block;\n}\n.eyebrow.muted{color:var(--ink-3)}\n.eyebrow.muted::before{background:var(--line-strong)}\n.eyebrow.light{color:var(--accent-light)}\n.eyebrow.light::before{background:#3a4d80}\n\nh1,h2,h3{letter-spacing:-.02em;line-height:1.05;font-weight:800;color:var(--ink)}\n.h1{font-size:clamp(32px,4.3vw,56px);line-height:1.08;text-wrap:balance}\n.h2{font-size:clamp(30px,3.9vw,48px);line-height:1.08}\n.lead{font-size:clamp(17px,1.45vw,20px);color:var(--ink-2);line-height:1.6;font-weight:400}\n.accent{color:var(--accent)}\n.nowrap{white-space:nowrap}\n\n/* ---------- buttons ---------- */\n.btn{\n  display:inline-flex;align-items:center;gap:10px;\n  font-family:var(--font);font-weight:700;font-size:16px;\n  padding:16px 26px;border-radius:var(--r-md);border:none;cursor:pointer;\n  transition:transform .15s ease, box-shadow .2s ease, background .2s ease;\n  line-height:1;white-space:nowrap;\n}\n.btn .arr{transition:transform .2s ease}\n.btn:hover .arr{transform:translateX(4px)}\n.btn-primary{background:var(--accent);color:#fff;box-shadow:0 6px 18px rgba(var(--accent-rgb),.28)}\n.btn-primary:hover{background:var(--accent-press);transform:translateY(-2px);box-shadow:0 10px 26px rgba(var(--accent-rgb),.34)}\n.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line-strong)}\n.btn-ghost:hover{border-color:var(--ink);transform:translateY(-2px)}\n.btn-light{background:#fff;color:var(--ink-section)}\n.btn-light:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(0,0,0,.25)}\n\n/* ---------- nav ---------- */\nheader.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.85);backdrop-filter:blur(14px);border-bottom:1px solid transparent;transition:border-color .25s, box-shadow .25s}\nheader.nav.scrolled{border-color:var(--line);box-shadow:0 1px 0 rgba(15,23,42,.02)}\n.nav-inner{display:flex;align-items:center;justify-content:space-between;height:74px}\n.logo{display:flex;align-items:center;gap:11px;font-weight:800;font-size:20px;letter-spacing:-.03em;white-space:nowrap}\n.logo .mark{width:30px;height:30px;border-radius:9px;background:var(--accent);position:relative;flex:none;box-shadow:0 4px 10px rgba(var(--accent-rgb),.3)}\n.logo .mark::before{content:\"\";position:absolute;inset:9px;border-radius:50%;border:2.4px solid #fff;border-right-color:transparent;transform:rotate(-45deg)}\n.logo .mark::after{content:\"\";position:absolute;width:6px;height:6px;border-radius:50%;background:#fff;right:7px;top:7px}\n.logo b{font-weight:800}\n.logo span{color:var(--accent)}\n.nav-links{display:flex;gap:30px;font-size:15px;font-weight:600;color:var(--ink-2);white-space:nowrap}\n.nav-links a{transition:color .15s}\n.nav-links a:hover{color:var(--accent)}\n.nav-cta{display:flex;align-items:center;gap:18px}\n@media(max-width:920px){.nav-links{display:none}}\n@media(max-width:560px){.nav-cta .btn{padding:11px 16px;font-size:14px}.nav-cta .btn .arr{display:none}}\n\n/* ---------- reveal ---------- */\n/* reveal: base state is VISIBLE; hiding is progressive enhancement gated by .anim on <html> */\n.reveal{transition:opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1)}\n.anim .reveal:not(.in){opacity:0;transform:translateY(22px)}\n.reveal.d1{transition-delay:.08s}.reveal.d2{transition-delay:.16s}.reveal.d3{transition-delay:.24s}.reveal.d4{transition-delay:.32s}\n@media(prefers-reduced-motion:reduce){.anim .reveal:not(.in){opacity:1;transform:none}}\n@media print{.reveal{opacity:1!important;transform:none!important;transition:none!important}}\n\n/* =========================================================\n   HERO\n========================================================= */\n.hero{padding:64px 0 92px;position:relative;overflow:hidden}\n.hero::before{content:\"\";position:absolute;top:-200px;right:-160px;width:620px;height:620px;border-radius:50%;background:radial-gradient(circle,var(--accent-soft),transparent 68%);opacity:.7;pointer-events:none}\n.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:56px;align-items:center;position:relative}\n.hero h1{margin:20px 0 22px}\n.hero .lead{max-width:560px;margin-bottom:26px}\n.hero-cta{display:flex;flex-wrap:wrap;align-items:center;gap:16px;margin-top:30px}\n.under-cta{font-size:14px;color:var(--ink-3);max-width:430px;line-height:1.5;margin-top:14px}\n\n.compare{\n  display:inline-flex;align-items:stretch;gap:0;border:1px solid var(--line);background:var(--surface);\n  border-radius:var(--r-md);b n  .lead-card{right:0}\n}\n\n/* =========================================================\n   GENERIC SECTION HEADER\n========================================================= */\n.sec{padding:96px 0}\n.sec-head{max-width:760px;margin-bottom:54px}\n.sec-head .h2{margin:18px 0 0}\n.sec-head .lead{margin-top:20px}\n.center{text-align:center;margin-left:auto;margin-right:auto}\n.center .eyebrow{justify-content:center}\n\n/* =========================================================\n   PAIN (dark)\n========================================================= */\n.dark{background:var(--ink-section);color:var(--ink-section-soft)}\n.dark h2,.dark h3{color:#fff}\n.dark .lead{color:#b3bbca}\n.pain{padding:104px 0}\n.pain-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:64px;align-items:center}\n.pain h2{margin:20px 0 26px}\n.pain p{color:#aeb6c6;font-size:17.5px;line-height:1.62;margin-bottom:18px;max-width:560px}\n.pain .micro{\n  margin-top:30px;border-left:3px solid var(--accent);padding:4px 0 4px 20px;\n  font-size:18px;font-weight:600;color:#fff;line-height:1.45;\n}\n.pain .micro b{color:var(--accent)}\n\n.timeline{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:var(--r-lg);padding:26px;backdrop-filter:blur(2px)}\n.timeline .tl-title{font-family:var(--mono);font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:#7e8798;margin-bottom:20px}\n.tl-row{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px dashed rgba(255,255,255,.1)}\n.tl-row:last-child{border-bottom:none}\n.tl-min{font-family:var(--mono);font-weight:600;font-size:15px;width:62px;flex:none;color:#d6dce8}\n.tl-bar{flex:1;height:9px;border-radius:6px;background:rgba(255,255,255,.08);overflow:hidden;position:relative}\n.tl-bar i{position:absolute;left:0;top:0;bottom:0;border-radius:6px;display:block}\n.tl-row.them .tl-bar i{background:#565e6e;width:0;animation:grow 1.6s forwards}\n.tl-row.you .tl-min{color:var(--accent)}\n.tl-row.you .tl-bar i{background:var(--accent);width:0;animation:grow 1.6s forwards}\n.tl-row .tl-end{font-size:13px;color:#7e8798;width:128px;flex:none;text-align:right}\n.tl-row.you .tl-end{color:#7df0b1;font-weight:600}\n@keyframes grow{to{width:var(--w,100%)}}\n\n@media(max-width:880px){.pain-grid{grid-template-columns:1fr;gap:44px}}\n\n/* =========================================================\n   SOLUTION\n========================================================= */\n.sol-grid{display:grid;grid-template-columns:.9fr 1.1fr;gap:60px;align-items:start}\n.sol-note{font-size:16px;color:var(--ink-2);line-height:1.6;margin-top:18px}\n.sol-note b{color:var(--ink);font-weight:700}\n.do-list{display:flex;flex-direction:column;gap:2px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);overflow:hidden}\n.do-item{display:flex;gap:18px;padding:22px 24px;align-items:flex-start;transition:background .15s}\n.do-item:not(:last-child){border-bottom:1px solid var(--line)}\n.do-item:hover{background:var(--accent-tint)}\n.do-num{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);background:var(--accent-soft);width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex:none;margin-top:1px}\n.do-item .txt{font-size:16.5px;line-height:1.5}\n.do-item .txt b{font-weight:700}\n.do-item .txt span{color:var(--ink-2)}\n@media(max-width:880px){.sol-grid{grid-template-columns:1fr;gap:40px}}\n\n/* =========================================================\n   CHANNELS\n========================================================= */\n.chan-main{\n  display:grid;grid-template-columns:auto 1fr;gap:26px;align-items:center;\n  background:var(--ink-section);color:#fff;border-radius:var(--r-lg);padding:30px 34px;margin-bottom:22px;\n  box-shadow:var(--shadow-md);position:relative;overflow:hidden;\n}\n.chan-main::after{content:\"\";position:absolute;right:-80px;top:-80px;width:280px;height:280px;border-radius:50%;backgrou play:flex;gap:16px;padding:22px 24px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md)}\n.reason .rn{flex:none;width:38px;height:38px;border-radius:11px;background:var(--ink);color:#fff;display:grid;place-items:center;font-weight:800;font-size:16px}\n.reason h4{font-size:16.5px;font-weight:700;margin-bottom:5px}\n.reason p{font-size:14.5px;color:var(--ink-2);line-height:1.5}\n@media(max-width:760px){.niche-grid{grid-template-columns:1fr}.reasons{grid-template-columns:1fr}}\n\n/* =========================================================\n   CHANGES\n========================================================= */\n.changes{display:flex;flex-direction:column;gap:0;border-top:1px solid var(--line)}\n.change{display:grid;grid-template-columns:1fr auto 1.1fr;gap:30px;align-items:center;padding:26px 8px;border-bottom:1px solid var(--line);transition:padding-left .2s, background .2s}\n.change:hover{background:var(--surface);padding-left:22px}\n.change .from{font-size:18px;font-weight:700;color:var(--ink)}\n.change .arrow{font-family:var(--mono);color:var(--accent);font-weight:700;font-size:20px}\n.change .to{font-size:16px;color:var(--ink-2);line-height:1.45}\n@media(max-width:680px){.change{grid-template-columns:1fr;gap:6px}.change .arrow{display:none}}\n\n/* =========================================================\n   PILOT\n========================================================= */\n.pilot-grid{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center}\n.pilot h2{margin:18px 0 24px}\n.pilot p{color:#a9b2c3;font-size:17px;line-height:1.62;margin-bottom:18px;max-width:540px}\n.pilot p b{color:#fff}\n.pilot-quote{margin-top:28px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:var(--r-md);padding:22px 24px;font-size:15.5px;color:#a4adbf;line-height:1.55;font-style:italic;position:relative}\n.pilot-quote::before{content:\"”\";position:absolute;top:6px;left:14px;font-size:50px;color:var(--accent); x}\n.final p b{color:#fff}\n.final .hl{color:var(--accent-light)}\n.form-card{background:var(--surface);border-radius:var(--r-xl);padding:34px;box-shadow:var(--shadow-lg)}\n.form-card .fc-title{font-size:21px;font-weight:800;color:var(--ink);margin-bottom:4px;letter-spacing:-.01em}\n.form-card .fc-sub{font-size:14px;color:var(--ink-3);margin-bottom:24px}\n.field{margin-bottom:18px}\n.field label{display:block;font-size:14px;font-weight:700;color:var(--ink);margin-bottom:4px}\n.field .hint{font-size:13px;color:var(--ink-3);font-weight:400;margin-bottom:9px;line-height:1.4}\n.chips{display:flex;flex-wrap:wrap;gap:9px}\n.chip{font-size:14px;font-weight:600;padding:10px 16px;border-radius:11px;border:1.5px solid var(--line-strong);background:var(--surface);color:var(--ink-2);cursor:pointer;transition:all .15s}\n.chip:hover{border-color:var(--accent)}\n.chip.sel{background:var(--accent);border-color:var(--accent);color:#fff}\n.input{width:100%;font-family:var(--font);font-size:15.5px;padding:14px 16px;border:1.5px solid var(--line-strong);border-radius:12px;background:var(--surface);color:var(--ink);transition:border-color .15s, box-shadow .15s}\n.input::placeholder{color:var(--ink-3)}\n.input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}\n.form-card .btn-primary{width:100%;justify-content:center;margin-top:8px;font-size:17px;padding:17px}\n.form-micro{font-size:13px;color:var(--ink-3);text-align:center;margin-top:14px;line-height:1.5}\n.form-ok{display:none;text-align:center;padding:30px 10px}\n.form-ok.show{display:block}\n.form-ok .ok-ic{width:60px;height:60px;border-radius:50%;background:var(--good-soft);color:var(--good);display:grid;place-items:center;margin:0 auto 18px;font-size:30px}\n.form-ok h3{font-size:22px;margin-bottom:10px}\n.form-ok p{color:var(--ink-2);font-size:15px;line-height:1.5;max-width:330px;margin:0 auto}\n@media(max-width:860px){.final-grid{grid-template-columns:1fr;gap:44px}}\n\n/* ====================== \"hero-cta reveal d3\">\n        <a href=\"#form\" class=\"btn btn-primary\">Получить тест-агента <span class=\"arr\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n      <p class=\"under-cta reveal d3\">Напишите в Telegram — соберу готового агента под вашу нишу и пришлю прямо в чат. Напишете ему как клиент и сами увидите, как он отвечает.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"demo reveal d2\" aria-hidden=\"true\">\n      <div class=\"demo-timer\">\n        <span class=\"num\" id=\"heroTimer\">00:00<\u002Fspan>\n        <span class=\"lbl\">первый<br>ответ<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"demo-card\">\n        <div class=\"demo-head\">\n          <span class=\"avito\">Avito<\u002Fspan>\n          <span class=\"who\">Заявка с объявления<small>агент онлайн<\u002Fsmall><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"demo-body\" id=\"demoBody\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"lead-card\" id=\"leadCard\">\n        <div class=\"lc-top\">Заявка готова<\u002Fdiv>\n        <div class=\"row\"><span class=\"k\">Техника<\u002Fspan><span class=\"v\">Стиралка<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span class=\"k\">Поломка<\u002Fspan><span class=\"v\">Не сливает<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span class=\"k\">Район<\u002Fspan><span class=\"v\">Дзержинский<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span class=\"k\">Телефон<\u002Fspan><span class=\"v\">+7 905 …<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== 2. PAIN (dark) ===================== -->\n<section class=\"dark pain\" id=\"pain\">\n  <div class=\"wrap pain-grid\">\n    <div>\n      <div class=\"reveal\"><span class=\"eyebrow light\">Боль Авито<\u002Fspan><\u002Fdiv>\n      <h2 class=\"h2 reveal d1\">Вы платите за размещение на Авито. А заявку забирает тот, кто ответил быстрее<\u002Fh2>\n      <p class=\"reveal d2\">На Авито клиент пишет не одному вам — он пишет сразу нескольким сервисам и едет к тому, кто откликнулся первым. Пока ваш менеджер на выезде, на телефоне или просто не успел открыть чат, проходит 30, 40, 60 минут. К этому моменту клиент уже договорился с другим мастером.<\u002Fp>\n      <p class=\"reveal d2\">Обращение было. Деньги за размещение вы заплатили. А заявки — нет.<\u002Fp>\n      <p class=\"micro reveal d3\">На Авито решает не цена и не отзывы. Решают <b>первые минуты<\u002Fb>. Их вы и теряете.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"timeline reveal d2\">\n      <div class=\"tl-title\">Одно обращение на Авито — кто его заберёт<\u002Fdiv>\n      <div class=\"tl-row you\">\n        <span class=\"tl-min\">0:20<\u002Fspan>\n        <span class=\"tl-bar\"><i style=\"--w:14%\"><\u002Fi><\u002Fspan>\n        <span class=\"tl-end\">ваш агент ответил<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"tl-row them\">\n        <span class=\"tl-min\">31:00<\u002Fspan>\n        <span class=\"tl-bar\"><i style=\"--w:78%\"><\u002Fi><\u002Fspan>\n        <span class=\"tl-end\">конкурент ответил<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"tl-row them\">\n        <span class=\"tl-min\">35:00<\u002Fspan>\n        <span class=\"tl-bar\"><i style=\"--w:92%\"><\u002Fi><\u002Fspan>\n        <span class=\"tl-end\">вы открыли чат<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"tl-row them\">\n        <span class=\"tl-min\">40:00<\u002Fspan>\n        <span class=\"tl-bar\"><i style=\"--w:100%;background:#2a3142\"><\u002Fi><\u002Fspan>\n        <span class=\"tl-end\">клиент уже уехал<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== 3. SOLUTION ===================== -->\n<section class=\"sec\" id=\"solution\">\n  <div class=\"wrap\">\n    <div class=\"sol-grid\">\n      <div class=\"sec-head\" style=\"margin-bottom:0\">\n        <div class=\"reveal\"><span class=\"eyebrow\">Решение<\u002Fspan><\u002Fdiv>\n        <h2 class=\"h2 reveal d1\">AI-агент отвечает первым — и доводит обращение до заявки<\u002Fh2>\n        <p class=\"sol-note reveal d2\">Это не «чат-бот с кнопками». Это <b>AI-администратор первой линии<\u002Fb>, обученный под ваш сервис: знает ваш прайс, районы выезда и типовые поломки.<\u002Fp>\n        <div class=\"hero-cta reveal d3\" style=\"margin-top:30px\">\n          <a href=\"#form\" class=\"btn btn-primary\">Проверить агента на своём примере <span class=\"arr\">→<\u002Fspan><\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"do-list reveal d2\">\n        <div class=\"do-item\"><span class=\"do-num\">01<\u002Fspan><span class=\"txt\"><b>Отвечает за секунды<\u002Fb> <span>— пока клиент ещё в чате и готов общаться<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"do-item\"><span class=\"do-num\">02<\u002Fspan><span class=\"txt\"><b>Уточняет<\u002Fb>, <span>что за техника и что случилось<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"do-item\"><span class=\"do-num\">03<\u002Fspan><span class=\"txt\"><b>Собирает<\u002Fb> <span>имя, телефон и район<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"do-item\"><span class=\"do-num\">04<\u002Fspan><span class=\"txt\"><b>Передаёт готовую заявку<\u002Fb> <span>— в Telegram-группу или в CRM<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div class=\"do-item\"><span class=\"do-num\">05<\u002Fspan><span class=\"txt\"><b>Возвращает «молчунов»<\u002Fb> <span>— тех, кто написал, но ушёл подумать, мягким сообщением без скидок<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== 4. CHANNELS ===================== -->\n<section class=\"sec\" id=\"channels\" style=\"background:var(--surface-2)\">\n  <div class=\"wrap\">\n    <div class=\"sec-head center reveal\">\n      <span class=\"eyebrow\">Каналы<\u002Fspan>\n      <h2 class=\"h2\">Отвечает везде, где пишет клиент<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"chan-main reveal d1\">\n      <span class=\"chan-badge\">Главный канал<\u002Fspan>\n      <div class=\"ct\">\n        <h3>Авито<\u002Fh3>\n        <p>Именно здесь скорость ответа напрямую решает, ваша заявка или конкурента. Агент откликается мгновенно и не даёт клиенту уйти к тому, кто ответил быстрее. <em>(Работает при активной подходящей подписке Авито.)<\u002Fem><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chan-grid reveal d2\">\n      <div class=\"chan\"><span class=\"dot\" style=\"background:#2aabee\">TG<\u002Fspan><span class=\"nm\">Telegram<small>бот, группа, аккаунт<\u002Fsmall><\u002Fspan><\u002Fdiv>\n      <div class=\"chan\"><span class=\"dot\" style=\"background:#0077ff\">ВК<\u002Fspan><span class=\"nm\">ВКонтакте<small>сообщения сообщества<\u002Fsmall><\u002Fspan><\u002Fdiv>\n      <div class=\"chan\"><span class=\"dot\" style=\"background:#6b4eff\">MAX<\u002Fspan><span class=\"nm\">MAX<small>мессенджер<\u002Fsmall><\u002Fspan><\u002Fdiv>\n      <div class=\"chan\"><span class=\"dot\" style=\"background:#25d366\">WA<\u002Fspan><span class=\"nm\">WhatsApp<small>бизнес-аккаунт<\u002Fsmall><\u002Fspan><\u002Fdiv>\n      <div class=\"chan\"><span class=\"dot\" style=\"background:#e1306c\">IG<\u002Fspan><span class=\"nm\">Instagram<small>директ<\u002Fsmall><\u002Fspan><\u002Fdiv>\n      <div class=\"chan\"><span class=\"dot\" style=\"background:var(--ink)\">www<\u002Fspan><span class=\"nm\">Сайт<small>чат на ваших страницах<\u002Fsmall><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"chan-foot reveal d2\"><b>Одна логика, один обученный агент<\u002Fb> — на всех каналах сразу. Клиенту неважно, откуда он пишет: ответ приходит за секунды в любом.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== 5. HOW IT WORKS ===================== -->\n<section class=\"sec\" id=\"how\">\n  <div class=\"wrap\">\n    <div class=\"sec-head reveal\">\n      <span class=\"eyebrow\">Как это работает<\u002Fspan>\n      <h2 class=\"h2\">Четыре шага — от сообщения до заявки<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"steps reveal d1\">\n      <div class=\"step\">\n        <div class=\"step-n\">01<\u002Fdiv>\n        <h3>Клиент пишет<\u002Fh3>\n        <p>в любой канал: <em>«Сколько стоит ремонт стиралки?»<\u002Fem>, <em>«Холодильник не морозит»<\u002Fem>.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-n\">02<\u002Fdiv>\n        <h3>Агент отвечает за 20 секунд<\u002Fh3>\n        <p>и уточняет: что за техника, что случилось, какой район.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-n\">03<\u002Fdiv>\n        <h3>Собирает контакты<\u002Fh3>\n        <p>имя и телефон, фиксирует суть проблемы.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"step-n\">04<\u002Fdiv>\n        <h3>Передаёт заявку<\u002Fh3>\n        <p>готовую — и сам возвращает тех, кто не дошёл до конца.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"steps-foot reveal d2\">\n      <span class=\"ic\">≡<\u002Fspan>\n      <span>Менеджер получает не «висящий чат», а <b>карточку заявки<\u002Fb>: кто, что сломалось, район, телефон. Остаётся позвонить и согласовать выезд.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== 6. NICHES ===================== -->\n<section class=\"sec\" id=\"niches\" style=\"background:var(--surface-2)\">\n  <div class=\"wrap\">\n    <div class=\"sec-head reveal\">\n      <span class=\"eyebrow\">Почему именно эти ниши<\u002Fspan>\n      <h2 class=\"h2\">Начали с трёх ниш, где скорость ответа решает больше всего<\u002Fh2>\n      <p class=\"lead\">Кондиционеры, стиральные машины, холодильники — именно здесь AI-агент даёт максимальный эффект.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"niche-grid reveal d1\">\n      <div class=\"niche\">\n        <div class=\"icn\">\n          <svg width=\"36\" height=\"36\" viewBox=\"0 0 36 36\"><rect class=\"ic-line\" x=\"4\" y=\"7\" width=\"28\" height=\"13\" rx=\"3\"><\u002Frect><line class=\"ic-line\" x1=\"9\" y1=\"25\" x2=\"9\" y2=\"28\"><\u002Fline><line class=\"ic-line\" x1=\"16\" y1=\"25\" x2=\"16\" y2=\"29\"><\u002Fline><line class=\"ic-line\" x1=\"23\" y1=\"25\" x2=\"23\" y2=\"28\"><\u002Fline><line class=\"ic-line\" x1=\"8\" y1=\"15\" x2=\"20\" y2=\"15\"><\u002Fline><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Кондиционеры<\u002Fh3>\n        <p>сезонные пики летом<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"niche\">\n        <div class=\"icn\">\n          <svg width=\"36\" height=\"36\" viewBox=\"0 0 36 36\"><rect class=\"ic-line\" x=\"7\" y=\"4\" width=\"22\" height=\"28\" rx=\"4\"><\u002Frect><circle class=\"ic-line\" cx=\"18\" cy=\"20\" r=\"7\"><\u002Fcircle><circle class=\"ic-fill\" cx=\"18\" cy=\"20\" r=\"2.4\"><\u002Fcircle><circle class=\"ic-fill\" cx=\"12\" cy=\"9\" r=\"1.6\"><\u002Fcircle><circle class=\"ic-fill\" cx=\"17\" cy=\"9\" r=\"1.6\"><\u002Fcircle><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Стиральные машины<\u002Fh3>\n        <p>есть в каждой квартире<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"niche\">\n        <div class=\"icn\">\n          <svg width=\"36\" height=\"36\" viewBox=\"0 0 36 36\"><rect class=\"ic-line\" x=\"9\" y=\"4\" width=\"18\" height=\"28\" rx=\"4\"><\u002Frect><line class=\"ic-line\" x1=\"9\" y1=\"15\" x2=\"27\" y2=\"15\"><\u002Fline><line class=\"ic-line\" x1=\"13\" y1=\"9\" x2=\"13\" y2=\"12\"><\u002Fline><line class=\"ic-line\" x1=\"13\" y1=\"19\" x2=\"13\" y2=\"23\"><\u002Fline><\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Холодильники<\u002Fh3>\n        <p>срочный ремонт<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"reasons reveal d2\">\n      <div class=\"reason\"><span class=\"rn\">!<\u002Fspan><div><h4>Срочность<\u002Fh4><p>Холодильник потёк, кондиционер не охлаждает в жару, стиралка залила соседей — клиент ищет мастера прямо сейчас и пишет сразу нескольким. Кто ответил первым, тот и забрал заказ.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"reason\"><span class=\"rn\">∞<\u002Fspan><div><h4>Большой поток обращений<\u002Fh4><p>Эта техника есть в каждой квартире, ломается постоянно — на Авито и в мессенджерах идёт плотный поток заявок, и терять их особенно дорого.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"reason\"><span class=\"rn\">?<\u002Fspan><div><h4>Типовые вопросы<\u002Fh4><p>«Сколько стоит», «выезжаете ли в мой район», «когда приедете» — агент закрывает их сам и квалифицирует клиента за секунды.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"reason\"><span class=\"rn\">↑<\u002Fspan><div><h4>Сезонные пики<\u002Fh4><p>Летом — шквал по кондиционерам, в другие сезоны — своя нагрузка. В пик менеджеры физически не успевают. Агент держит первую линию без перегрузки.<\u002Fp><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"niche-cta reveal d3\">\n      <p><b>Ремонтируете другую технику?<\u002Fb> Та же архитектура настраивается под посудомойки, СВЧ-печи, бойлеры, телевизоры и другие ниши. Напишите — соберу тест-агента под вас.<\u002Fp>\n      <a href=\"#form\" class=\"btn btn-primary\">Получить тест-агента <span class=\"arr\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== 7. CHANGES ===================== -->\n<section class=\"sec\" id=\"changes\">\n  <div class=\"wrap\">\n    <div class=\"sec-head reveal\">\n      <span class=\"eyebrow\">Что меняется<\u002Fspan>\n      <h2 class=\"h2\">Что меняется, когда первую линию держит агент<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"changes reveal d1\">\n      <div class=\"change\"><span class=\"from\">Быстрее первый ответ<\u002Fspan><span class=\"arrow\">→<\u002Fspan><span class=\"to\">меньше потерянных обращений, особенно на Авито<\u002Fspan><\u002Fdiv>\n      <div class=\"change\"><span class=\"from\">Работа 24/7<\u002Fspan><span class=\"arrow\">→<\u002Fspan><span class=\"to\">заявки вечером, ночью и в выходные не уходят к конкурентам<\u002Fspan><\u002Fdiv>\n      <div class=\"change\"><span class=\"from\">Разгрузка менеджеров<\u002Fspan><span class=\"arrow\">→<\u002Fspan><span class=\"to\">типовые вопросы закрывает агент, люди занимаются реальными заявками и выездами<\u002Fspan><\u002Fdiv>\n      <div class=\"change\"><span class=\"from\">Дожим молчунов<\u002Fspan><span class=\"arrow\">→<\u002Fspan><span class=\"to\">клиент, который «ушёл подумать», возвращается в диалог<\u002Fspan><\u002Fdiv>\n      <div class=\"change\"><span class=\"from\">Меньше слитого бюджета<\u002Fspan><span class=\"arrow\">→<\u002Fspan><span class=\"to\">больше оплаченных обращений доходит до заявки<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== 8. QUALITY (dark) ===================== -->\n<section class=\"dark sec\" id=\"quality\">\n  <div class=\"wrap pilot pilot-grid\">\n    <div>\n      <div class=\"reveal\"><span class=\"region-tag\">● Под капотом · ChatGPT 5.5<\u002Fspan><\u002Fdiv>\n      <h2 class=\"h2 reveal d1\" style=\"margin-top:18px\">Общается как живой человек — вежливо и с эмпатией<\u002Fh2>\n      <p class=\"reveal d2\">Под капотом — умная модель <b>ChatGPT 5.5<\u002Fb>. Агент понимает свободную речь, опечатки и сбивчивые описания поломки, отвечает по-человечески: поддержит расстроенного клиента, спокойно уточнит детали и не теряется, если вопрос задан «не по сценарию».<\u002Fp>\n      <p class=\"reveal d2\">Он обучен на данных вашего сервиса — <b>прайс, услуги, районы выезда<\u002Fb> — и работает по вашим правилам, а не по жёстким кнопкам.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"qual-list reveal d2\">\n      <div class=\"qual\"><span class=\"qn\">✓<\u002Fspan><div><h4>Гарантия и жалобы<\u002Fh4><p>обучен работать с обращениями по гарантии и с недовольными клиентами — отвечает спокойно и с эмпатией, не спорит и не отписывается шаблоном<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"qual\"><span class=\"qn\">→<\u002Fspan><div><h4>Нестандартные случаи<\u002Fh4><p>сложный или нетиповой вопрос не выдумывает — сразу передаёт мастеру или администратору и предупреждает об этом клиента<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"qual\"><span class=\"qn\">❞<\u002Fspan><div><h4>Живой тон<\u002Fh4><p>короткие человеческие фразы без роботных шаблонов: уточняет, переспрашивает, обращается по имени<\u002Fp><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== CTA BANNER ===================== -->\n<section class=\"midcta\">\n  <div class=\"wrap\">\n    <div class=\"midcta-bar reveal\">\n      <p>Проверьте на своём примере — пришлю тест-агента под вашу нишу<\u002Fp>\n      <a href=\"#form\" class=\"btn btn-light\">Получить тест-агента <span class=\"arr\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== 9. UPSELL ===================== -->\n<section class=\"sec\" id=\"upsell\">\n  <div class=\"wrap\">\n    <div class=\"sec-head reveal\">\n      <span class=\"eyebrow\">Усиление<\u002Fspan>\n      <h2 class=\"h2\">Можно усилить под ваши процессы<\u002Fh2>\n      <p class=\"lead\">Базово агент уже отвечает в ваших каналах и отдаёт заявки. Дальше — по задаче.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"up-grid reveal d1\">\n      <div class=\"up\"><span class=\"uic\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\"><rect class=\"ic-line\" x=\"3\" y=\"4\" width=\"18\" height=\"6\" rx=\"2\"><\u002Frect><rect class=\"ic-line\" x=\"3\" y=\"14\" width=\"18\" height=\"6\" rx=\"2\"><\u002Frect><circle class=\"ic-fill\" cx=\"7\" cy=\"7\" r=\"1.5\"><\u002Fcircle><circle class=\"ic-fill\" cx=\"7\" cy=\"17\" r=\"1.5\"><\u002Fcircle><\u002Fsvg><\u002Fspan><div><h3>Подключение CRM<\u002Fh3><p>заявки падают сразу в вашу систему<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"up\"><span class=\"uic\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\"><path class=\"ic-line\" d=\"M12 3v3M12 18v3M3 12h3M18 12h3M6 6l2 2M16 16l2 2M18 6l-2 2M8 16l-2 2\"><\u002Fpath><circle class=\"ic-line\" cx=\"12\" cy=\"12\" r=\"4\"><\u002Fcircle><\u002Fsvg><\u002Fspan><div><h3>Кастомные сценарии<\u002Fh3><p>под ваши процессы, акции и регламенты<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"up\"><span class=\"uic\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\"><path class=\"ic-line\" d=\"M5 5h14v14H5z\"><\u002Fpath><line class=\"ic-line\" x1=\"9\" y1=\"9\" x2=\"15\" y2=\"9\"><\u002Fline><line class=\"ic-line\" x1=\"9\" y1=\"13\" x2=\"15\" y2=\"13\"><\u002Fline><line class=\"ic-line\" x1=\"9\" y1=\"17\" x2=\"12\" y2=\"17\"><\u002Fline><\u002Fsvg><\u002Fspan><div><h3>Расширение базы знаний и FAQ<\u002Fh3><p>больше вопросов агент закрывает сам<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"up\"><span class=\"uic\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\"><circle class=\"ic-line\" cx=\"7\" cy=\"8\" r=\"3\"><\u002Fcircle><circle class=\"ic-line\" cx=\"16\" cy=\"8\" r=\"3\"><\u002Fcircle><path class=\"ic-line\" d=\"M3 20c0-3 2-5 4-5s4 2 4 5M13 20c0-3 2-5 4-5s4 2 4 5\"><\u002Fpath><\u002Fsvg><\u002Fspan><div><h3>Новые каналы и ниши<\u002Fh3><p>второй и третий агент под другие направления<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"up\"><span class=\"uic\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\"><rect class=\"ic-line\" x=\"4\" y=\"4\" width=\"6\" height=\"6\"><\u002Frect><rect class=\"ic-line\" x=\"14\" y=\"4\" width=\"6\" height=\"6\"><\u002Frect><rect class=\"ic-line\" x=\"4\" y=\"14\" width=\"6\" height=\"6\"><\u002Frect><line class=\"ic-line\" x1=\"14\" y1=\"14\" x2=\"17\" y2=\"14\"><\u002Fline><line class=\"ic-line\" x1=\"20\" y1=\"14\" x2=\"20\" y2=\"17\"><\u002Fline><line class=\"ic-line\" x1=\"14\" y1=\"17\" x2=\"14\" y2=\"20\"><\u002Fline><line class=\"ic-line\" x1=\"17\" y1=\"20\" x2=\"20\" y2=\"20\"><\u002Fline><\u002Fsvg><\u002Fspan><div><h3>Листовки и визитки с QR-кодом<\u002Fh3><p>клиент сканирует — и попадает прямо к вашему агенту в Telegram или MAX<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"up\"><span class=\"uic\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\"><rect class=\"ic-line\" x=\"3\" y=\"4\" width=\"18\" height=\"14\" rx=\"2\"><\u002Frect><line class=\"ic-line\" x1=\"3\" y1=\"8\" x2=\"21\" y2=\"8\"><\u002Fline><path class=\"ic-line\" d=\"M13 12h5v3.5h-3l-2 2z\"><\u002Fpath><\u002Fsvg><\u002Fspan><div><h3>Продающий одностраничный сайт<\u002Fh3><p>под ваш сервис, со встроенным агентом прямо в чате на странице<\u002Fp><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"up-foot reveal d2\">// а также другие консультации и решения по применению ИИ в вашем деле — обсуждается под вашу задачу<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== 10. FAQ ===================== -->\n<section class=\"sec\" id=\"faq\" style=\"background:var(--surface-2)\">\n  <div class=\"wrap\">\n    <div class=\"sec-head center reveal\">\n      <span class=\"eyebrow\">FAQ<\u002Fspan>\n      <h2 class=\"h2\">Частые вопросы<\u002Fh2>\n    <\u002Fdiv>\n    <div class=\"faq-wrap reveal d1\">\n      <div class=\"faq\"><button class=\"faq-q\" aria-expanded=\"false\"><span class=\"qt\">Сколько это стоит?<\u002Fspan><span class=\"pm\"><\u002Fspan><\u002Fbutton><div class=\"faq-a\"><div class=\"inner\">Зависит от объёма базы знаний и количества каналов. Формат: <b>разовая настройка агента под ваш сервис + сопровождение.<\u002Fb> Сначала вы бесплатно тестируете агента под свою нишу — цену обсуждаем только после того, как вы своими глазами увидели, как он работает.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"faq\"><button class=\"faq-q\" aria-expanded=\"false\"><span class=\"qt\">Это заменит моих менеджеров?<\u002Fspan><span class=\"pm\"><\u002Fspan><\u002Fbutton><div class=\"faq-a\"><div class=\"inner\">Нет. Агент берёт первую линию и рутину — мгновенный ответ, уточнение поломки, сбор контактов. <b>Менеджеры занимаются заявками, выездами и сложными случаями.<\u002Fb><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"faq\"><button class=\"faq-q\" aria-expanded=\"false\"><span class=\"qt\">Он будет отвечать невпопад?<\u002Fspan><span class=\"pm\"><\u002Fspan><\u002Fbutton><div class=\"faq-a\"><div class=\"inner\">Агент обучается на ваших данных и работает по вашим правилам. Сложные и нестандартные ситуации <b>передаёт менеджеру.<\u002Fb><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"faq\"><button class=\"faq-q\" aria-expanded=\"false\"><span class=\"qt\">Работает ли он на Авито?<\u002Fspan><span class=\"pm\"><\u002Fspan><\u002Fbutton><div class=\"faq-a\"><div class=\"inner\">Да — при активной подходящей подписке Авито. Это его <b>главный канал<\u002Fb>: именно там скорость ответа решает, кому достанется заявка.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"faq\"><button class=\"faq-q\" aria-expanded=\"false\"><span class=\"qt\">А в других каналах?<\u002Fspan><span class=\"pm\"><\u002Fspan><\u002Fbutton><div class=\"faq-a\"><div class=\"inner\">Telegram, ВКонтакте, MAX, WhatsApp, Instagram, чат на сайте — <b>один агент работает везде сразу.<\u002Fb><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"faq\"><button class=\"faq-q\" aria-expanded=\"false\"><span class=\"qt\">Откуда он знает мой прайс и районы?<\u002Fspan><span class=\"pm\"><\u002Fspan><\u002Fbutton><div class=\"faq-a\"><div class=\"inner\">Мы загружаем ваши данные в базу знаний агента: <b>услуги, цены, гео, типовые вопросы.<\u002Fb><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"faq\"><button class=\"faq-q\" aria-expanded=\"false\"><span class=\"qt\">Что с заявками ночью и в выходные?<\u002Fspan><span class=\"pm\"><\u002Fspan><\u002Fbutton><div class=\"faq-a\"><div class=\"inner\">Обрабатываются так же, как днём. Вы получаете готовую заявку и звоните в рабочее время.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"faq\"><button class=\"faq-q\" aria-expanded=\"false\"><span class=\"qt\">Как быстро запуск?<\u002Fspan><span class=\"pm\"><\u002Fspan><\u002Fbutton><div class=\"faq-a\"><div class=\"inner\">Тестового агента под вашу нишу пришлю в течение <b>[1–2 дней]<\u002Fb>. Полный запуск под ваш сервис — обычно <b>[3–5 рабочих дней]<\u002Fb> после того, как вы передадите прайс, список услуг и районы выезда.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== 11. FINAL CTA + FORM (dark) ===================== -->\n<section class=\"dark final\" id=\"form\">\n  <div class=\"wrap final-grid\">\n    <div>\n      <div class=\"reveal\"><span class=\"eyebrow light\">Проверьте сами<\u002Fspan><\u002Fdiv>\n      <h2 class=\"h2 reveal d1\">Не верьте на слово — проверьте на своём примере<\u002Fh2>\n      <p class=\"reveal d2\">Напишите мне в Telegram — пришлю готового агента под вашу нишу. Напишете ему как ваш клиент — <span class=\"hl\">спросите цену, опишите поломку<\u002Fspan> — и сами увидите, как он отвечает за секунды, уточняет проблему и собирает заявку.<\u002Fp>\n      <p class=\"reveal d2\"><b>Поняли, что так и должно работать у вас?<\u002Fb> Тогда обсудим запуск под ваш сервис.<\u002Fp>\n      <div class=\"persona reveal d3\">\n        <div>\n          <p class=\"pname\">Меня зовут Руслан<\u002Fp>\n          <p class=\"prole\">официальный партнёр Nextbot<\u002Fp>\n          <p class=\"pline\">Я лично собираю, обучаю и сопровождаю каждого агента — вы общаетесь напрямую со мной, без отдела продаж.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"form-card reveal d1\">\n        <div class=\"tg-badge\"><svg viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path d=\"M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71l-4.15-3.06-1.99 1.93c-.23.23-.42.42-.83.42z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"fc-title\">Напишите мне в Telegram<\u002Fdiv>\n        <div class=\"fc-sub\">Соберу тестового агента и отправлю прямо в чат. Без оплаты и обязательств.<\u002Fdiv>\n        <ul class=\"tg-steps\">\n          <li><span class=\"n\">1<\u002Fspan><span>Пишете мне — расскажете, какую технику ремонтируете<\u002Fspan><\u002Fli>\n          <li><span class=\"n\">2<\u002Fspan><span>Настраиваю его под ваши услуги и цены<\u002Fspan><\u002Fli>\n          <li><span class=\"n\">3<\u002Fspan><span>Тестируете как клиент — и решаете, запускаем ли<\u002Fspan><\u002Fli>\n        <\u002Ful>\n        <a href=\"https://t.me/extazzz898?text=Здравствуйте!%20Хочу%20тест-агента.%20Мы%20ремонтируем%20...\" target=\"_blank\" rel=\"noopener noreferrer\" class=\"btn btn-tg\">\n          <svg class=\"tg-ic\" viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path d=\"M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71l-4.15-3.06-1.99 1.93c-.23.23-.42.42-.83.42z\"><\u002Fpath><\u002Fsvg>\n          Написать в Telegram\n          <span class=\"arr\">→<\u002Fspan>\n        <\u002Fa>\n        <p class=\"form-micro\">Отвечаю лично, обычно в течение рабочего дня.<\u002Fp>\n      <\u002Fdiv>\n      <\u002Fdiv>\n  \n<\u002Fsection>\n\n<!-- ===================== FOOTER ===================== -->\n<footer>\n  <div class=\"wrap\">\n    <div class=\"foot-inner\">\n      <a href=\"#top\" class=\"logo\"><span class=\"mark\"><\u002Fspan><b>e<span>-<\u002Fspan>agents<\u002Fb><\u002Fa>\n      <nav class=\"foot-links\">\n        <a href=\"#solution\">Решение<\u002Fa>\n        <a href=\"#channels\">Каналы<\u002Fa>\n        <a href=\"#how\">Как работает<\u002Fa>\n        <a href=\"#faq\">Вопросы<\u002Fa>\n        <a href=\"#form\">Тестовый агент<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n    <div class=\"foot-copy\">e-agents · AI-агенты первой линии для сервисов по ремонту техники<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- ===================== STICKY MOBILE CTA ===================== -->\n<div class=\"mobile-cta\" id=\"mobileCta\">\n  <a href=\"#form\" class=\"btn btn-primary\">Получить тест-агента <span class=\"arr\">→<\u002Fspan><\u002Fa>\n<\u002Fdiv>\n\n<script>\n/* enable entrance animations only when JS+compositor are live; base state stays visible otherwise */\ndocument.documentElement.classList.add('anim');\n/* ---------- nav shadow ---------- */\nconst nav=document.getElementById('nav');\naddEventListener('scroll',()=>nav.classList.toggle('scrolled',scrollY>10));\n\n/* reveal on scroll — scroll/resize driven so it never depends on a single API firing */\nfunction revealInView(){\n  const h=innerHeight||document.documentElement.clientHeight;\n  document.querySelectorAll('.reveal:not(.in)').forEach(el=>{\n    if(el.getBoundingClientRect().top < h*0.9) el.classList.add('in');\n  });\n}\nlet rafPending=false;\nfunction onScroll(){if(rafPending)return;rafPending=true;requestAnimationFrame(()=>{revealInView();rafPending=false;});}\naddEventListener('scroll',onScroll,{passive:true});\naddEventListener('resize',onScroll);\naddEventListener('load',revealInView);\nrevealInView();\n/* last-resort safety net: reveal everything and un-stick transitions frozen during load */\nsetTimeout(()=>{\n  document.querySelectorAll('.reveal:not(.in)').forEach(el=>el.classList.add('in'));\n  document.querySelectorAll('.reveal.in').forEach(el=>{\n    if(parseFloat(getComputedStyle(el).opacity)<1){\n      el.style.transition='none';\n      void el.offsetWidth;\n      el.style.transition='';\n    }\n  });\n},2500);\n\n/* ---------- chat demo loop ---------- */\nconst body=document.getElementById('demoBody');\nconst leadCard=document.getElementById('leadCard');\nconst heroTimer=document.getElementById('heroTimer');\nconst script=[\n  {t:'client',html:'<span class=\"tag\">Клиент · Авито<\u002Fspan>Здравствуйте! Сколько стоит ремонт стиральной машины? Не сливает воду 😕'},\n  {typing:900},\n  {t:'agent',html:'<span class=\"tag\">Агент · 20 сек<\u002Fspan>Здравствуйте! Поможем 🙌 Подскажите марку машины и в каком вы районе — назову цену выезда и диагностики.'},\n  {t:'client',html:'Indesit, Дзержинский район'},\n  {typing:1100},\n  {t:'agent',html:'Принял! Мастер выезжает в Дзержинский, диагностика бесплатно при ремонте. Оставьте имя и телефон — передам заявку, мастер свяжется с вами в ближайшее время.'},\n  {t:'client',html:'Андрей, +7 905 …'},\n  {typing:800},\n  {t:'agent',html:'<span class=\"tag\">Заявка собрана ✓<\u002Fspan>Спасибо, Андрей! Передал заявку мастеру — он свяжется с вами в ближайшее время 👌'},\n];\nlet leadShown=false;\nfunction clearBody(){body.innerHTML='';leadCard.style.opacity='0';leadCard.style.transform='translateY(10px)';leadShown=false;cancelHeroTimer();setTimer(0);}\nfunction addMsg(t,html){\n  const d=document.createElement('div');d.className='msg '+t;d.innerHTML=html;body.appendChild(d);\n  body.scrollTop=body.scrollHeight;\n}\nfunction addTyping(){\n  const d=document.createElement('div');d.className='typing';d.innerHTML='<span><\u002Fspan><span><\u002Fspan><span><\u002Fspan>';d.id='typing';\n  body.appendChild(d);body.scrollTop=body.scrollHeight;return d;\n}\nasync function runDemo(){\n  clearBody();\n  let firstMsg=true;\n  for(let i=0;i<script.length;i++){\n    const s=script[i];\n    if(s.typing){const tp=addTyping();await wait(s.typing);tp.remove();continue;}\n    addMsg(s.t,s.html);\n    if(firstMsg){firstMsg=false;startHeroTimer(msUntilFirstAgent());}\n    if(s.html.includes('Заявка собрана')&&!leadShown){\n      leadShown=true;leadCard.style.transition='opacity .5s, transform .5s';\n      setTimeout(()=>{leadCard.style.opacity='1';leadCard.style.transform='none';},250);\n    }\n    await wait(s.t==='client'?900:1500);\n  }\n  await wait(4200);\n  runDemo();\n}\nfunction wait(ms){return new Promise(r=>setTimeout(r,ms));}\n\n/* hero timer: 00:00 starts with the first client message, counts up\n   and stops on 00:20 exactly when the first agent reply appears */\nlet timerRaf=null;\nfunction setTimer(v){heroTimer.textContent='00:'+String(v).padStart(2,'0');}\nfunction cancelHeroTimer(){if(timerRaf){cancelAnimationFrame(timerRaf);timerRaf=null;}}\nfunction msUntilFirstAgent(){\n  let ms=0;\n  for(const s of script){\n    if(s.typing){ms+=s.typing;continue;}\n    if(s.t==='agent')return ms;\n    ms+=900;\n  }\n  return ms;\n}\nfunction startHeroTimer(durationMs){\n  cancelHeroTimer();\n  const t0=performance.now();\n  (function tick(){\n    const p=Math.min((performance.now()-t0)/durationMs,1);\n    setTimer(Math.round(p*20));\n    if(p<1)timerRaf=requestAnimationFrame(tick);else timerRaf=null;\n  })();\n}\n\n/* start the demo loop only when the chat card enters the viewport —\n   scroll-driven, same approach as .reveal, so it never depends on a single API firing */\nlet demoStarted=false;\nconst demoCardEl=document.querySelector('.demo-card');\nfunction demoInViewCheck(){\n  if(demoStarted||!demoCardEl)return;\n  const h=innerHeight||document.documentElement.clientHeight;\n  const r=demoCardEl.getBoundingClientRect();\n  if(r.top<h*0.85&&r.bottom>0){demoStarted=true;runDemo();}\n}\naddEventListener('scroll',()=>requestAnimationFrame(demoInViewCheck),{passive:true});\naddEventListener('resize',demoInViewCheck);\naddEventListener('load',demoInViewCheck);\ndemoInViewCheck();\n\n/* ---------- FAQ ---------- */\ndocument.querySelectorAll('.faq-q').forEach(q=>{\n  q.addEventListener('click',()=>{\n    const faq=q.parentElement;const a=faq.querySelector('.faq-a');\n    const open=faq.classList.contains('open');\n    document.querySelectorAll('.faq.open').forEach(f=>{f.classList.remove('open');f.querySelector('.faq-a').style.maxHeight='0';f.querySelector('.faq-q').setAttribute('aria-expanded','false');});\n    if(!open){faq.classList.add('open');a.style.maxHeight=a.scrollHeight+'px';q.setAttribute('aria-expanded','true');}\n  });\n});\n\n/* ---------- sticky mobile CTA: show after hero, hide near final section ---------- */\nconst mbar=document.getElementById('mobileCta');\nconst heroSec=document.getElementById('top');\nconst finalSec=document.getElementById('form');\nfunction mbarCheck(){\n  const heroGone=heroSec.getBoundingClientRect().bottom<0;\n  const finalVisible=finalSec.getBoundingClientRect().top<innerHeight;\n  mbar.classList.toggle('show',heroGone&&!finalVisible);\n}\naddEventListener('scroll',()=>requestAnimationFrame(mbarCheck),{passive:true});\naddEventListener('resize',mbarCheck);\nmbarCheck();\n\n<\u002Fscript>\n\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
